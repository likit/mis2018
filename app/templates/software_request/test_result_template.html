<article class="media">
    <div class="media-content">
        <div class="content">
            <p>
                <strong>{{ test_result.creator.fullname }}</strong>
                -
                <small>{{ test_result.created_at|localdatetime }}</small>
                <br>
                {{ test_result.detail }}
                <br>
                <small>
                    <a hx-swap="innerHTML"
                       hx-target="#test-result-form"
                       hx-get="{{ url_for('software_request.create_test_result', test_result_id=test_result.id) }}"
                        แก้ไข
                    </a> ·
                    <a hx-delete="{{ url_for('software_request.delete_test_result', test_result_id=test_result.id) }}"
                       hx-headers='{"X-CSRF-Token": {{ csrf_token()|tojson|safe }} }'
                       hx-confirm="ท่านต้องการลบรายการนี้หรือไม่"
                    >
                        ลบ
                    </a>
                </small>
            </p>
        </div>
    </div>
</article>
